<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上四人象棋麻將（完美對局版）</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2e7d32; text-align: center; margin: 0; padding: 20px; color: white; }
        .hidden { display: none !important; }
        #lobby { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #game-container { max-width: 800px; margin: 0 auto; }
        
        input, button { padding: 10px 15px; font-size: 16px; margin: 10px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        
        .table-info { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 18px; }
        .seat-grid { display: flex; justify-content: space-around; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .seat { padding: 10px 15px; border-radius: 6px; font-size: 15px; background: rgba(0,0,0,0.2); }
        .seat.active { background: #ffeb3b; color: #000; font-weight: bold; box-shadow: 0 0 10px #ffeb3b; }
        
        .hand-label { font-size: 16px; margin: 10px 0 5px 0; text-align: left; font-weight: bold; color: #fff; }
        .card-area { display: flex; justify-content: center; gap: 8px; min-height: 95px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 8px; margin: 10px 0; }
        
        .mj-card { width: 48px; height: 72px; background: #fffde8; border: 2px solid #5d4037; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); user-select: none; transition: 0.15s; color: #212121; }
        .mj-card.red { color: #d32f2f; }
        .mj-card:hover { transform: translateY(-8px); background: #fff; }
        
        .pool-area { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; min-height: 130px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 2px dashed rgba(255,255,255,0.3); margin: 15px 0; }
        .pool-area .mj-card { width: 36px; height: 54px; font-size: 20px; cursor: default; }
        .pool-area .mj-card:hover { transform: none; background: #fffde8; }
        
        #interception-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #333; padding: 25px 40px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); z-index: 1000; }
        .modal-btn { font-size: 18px; padding: 10px 25px; margin: 10px; font-weight: bold; }
        .btn-pong { background: #ff9800; color: white; }
        .btn-win { background: #e53935; color: white; }
        .btn-pass { background: #757575; color: white; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="lobby">
        <h2>🀄️ 線上四人象棋麻將</h2>
        <input type="text" id="username" placeholder="輸入名字" value="玩家"><br>
        <input type="text" id="roomCode" placeholder="輸入房號"><br>
        <button onclick="connectToGame()">進入房間湊桌</button>
        <div id="wait-msg" style="margin-top: 15px; color: #666;"></div>
    </div>

    <div id="game-container" class="hidden">
        <div id="status" class="table-info">等待開局...</div>
        <div class="seat-grid" id="seats"></div>
        <div class="hand-label">📥 公共牌河 (剩餘牌數: <span id="deck-count">--</span> 張)</div>
        <div id="card-pool" class="pool-area"></div>
        <div class="hand-label">🫱 您的手牌 (目前: <span id="card-count">0</span> 張，點擊打出)</div>
        <div id="my-hand" class="card-area"></div>
        <div>
            <button id="zimo-btn" class="btn-win hidden" style="font-size:20px; padding:12px 30px;" onclick="declareZimo()">🎉 自摸胡牌！</button>
        </div>
    </div>

    <div id="interception-modal" class="hidden">
        <h3>有人打出了 <span id="intercept-card" style="color:red; font-size:32px;"></span></h3>
        <p>請問您要對這張牌進行操作嗎？</p>
        <button id="action-win" class="modal-btn btn-win hidden" onclick="sendAction('win')">胡 牌 🏆</button>
        <button id="action-pong" class="modal-btn btn-pong hidden" onclick="sendAction('pong')">碰 牌 🎴</button>
        <button class="modal-btn btn-pass" onclick="sendAction('pass')">過 🏃‍♂️</button>
    </div>

    <script>
        // ⚠️ 請一字不差換成你專屬的 Render 網址（保留引號與分號）
        const SERVER_URL = "https://mahjong-server-nwmj.onrender.com"; 
        
        let socket;
        let currentRoom = "";
        let myTurn = false;
        const redCards = ['帥', '仕', '相', '車', '馬', '炮', '兵'];
        let allPlayerNames = [];

        function connectToGame() {
            const username = document.getElementById('username').value.trim();
            const roomCode = document.getElementById('roomCode').value.trim();
            if(!username || !roomCode) return alert('請完整填寫！');

            currentRoom = roomCode;
            socket = io(SERVER_URL);

            socket.emit('joinRoom', { username, roomCode });
            document.getElementById('wait-msg').innerText = `正在排入房號 ${roomCode}...`;

            socket.on('roomUpdated', (players) => {
                document.getElementById('wait-msg').innerText = `目前湊桌人數 (${players.length}/4): ${players.join(', ')}`;
            });

            // 修正版接收機制
            socket.on('gameStart', (data) => {
                allPlayerNames = data.playerNames;
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                updateUI(data);
            });

            socket.on('gameStateUpdated', (data) => {
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                updateUI(data);
            });

            socket.on('askInterception', (data) => {
                document.getElementById('intercept-card').innerText = data.card;
                document.getElementById('intercept-card').className = redCards.includes(data.card) ? "red" : "";
                if (data.canWin) document.getElementById('action-win').classList.remove('hidden');
                else document.getElementById('action-win').classList.add('hidden');
                if (data.canPong) document.getElementById('action-pong').classList.remove('hidden');
                else document.getElementById('action-pong').classList.add('hidden');
                document.getElementById('interception-modal').classList.remove('hidden');
            });

            socket.on('gameOver', ({ winner, reason }) => {
                alert(`🎉 遊戲結束 🎉\n【贏家】：${winner}\n【原因】：${reason}`);
                location.reload();
            });

            socket.on('errorMessage', (msg) => alert(msg));
        }

        function updateUI(data) {
            myTurn = data.isMyTurn;
            document.getElementById('deck-count').innerText = data.deckCount;
            document.getElementById('card-count').innerText = data.myHand.length;

            if (data.playerNames) {
                allPlayerNames = data.playerNames;
            }

            const seatsDiv = document.getElementById('seats');
            seatsDiv.innerHTML = "";
            allPlayerNames.forEach((name, idx) => {
                let relation = "";
                if (idx === data.myIndex) relation = " (我)";
                else if (idx === (data.myIndex + 3) % 4) relation = " (上家)";
                else if (idx === (data.myIndex + 1) % 4) relation = " (下家)";
                else relation = " (對家)";

                let isActive = idx === data.turnIndex ? "active" : "";
                seatsDiv.innerHTML += `<div class="seat ${isActive}">👤 ${name}${relation}</div>`;
            });

            let currentTurnName = allPlayerNames[data.turnIndex];
            if (myTurn) {
                document.getElementById('status').innerHTML = "🟢 輪到你的回合！請點選一張牌打出去。";
            } else {
                document.getElementById('status').innerHTML = `🔴 目前是 <b>${currentTurnName}</b> 的回合，等待中...`;
            }

            if (data.lastPlayed) {
                let shooterName = allPlayerNames[data.lastPlayed.playerIndex];
                document.getElementById('status').innerHTML += `<br>⚠️ 剛才由【${shooterName}】打出了「<b>${data.lastPlayed.card}</b>」`;
            }

            if (myTurn && data.myHand.length === 8) {
                document.getElementById('zimo-btn').classList.remove('hidden');
            } else {
                document.getElementById('zimo-btn').classList.add('hidden');
            }

            const myHandDiv = document.getElementById('my-hand');
            myHandDiv.innerHTML = "";
            data.myHand.forEach((card, index) => {
                const colorClass = redCards.includes(card) ? 'red' : 'black';
                myHandDiv.innerHTML += `<div class="mj-card ${colorClass}" onclick="playCard(${index})">${card}</div>`;
            });

            const poolDiv = document.getElementById('card-pool');
            poolDiv.innerHTML = "";
            data.pool.forEach(card => {
                const colorClass = redCards.includes(card) ? 'red' : 'black';
                poolDiv.innerHTML += `<div class="mj-card ${colorClass}">${card}</div>`;
            });
        }

        function playCard(index) {
            if (!myTurn) return alert("還沒輪到你喔！");
            socket.emit('playCard', { roomCode: currentRoom, cardIndex: index });
        }

        function sendAction(action) {
            document.getElementById('interception-modal').classList.add('hidden');
            socket.emit('respondInterception', { roomCode: currentRoom, action });
        }

        function declareZimo() {
            if (!myTurn) return;
            socket.emit('claimWin', { roomCode: currentRoom });
        }
    </script>
</body>
</html>
