<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上四人象棋麻將</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; text-align: center; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        #lobby, #game-container { max-width: 650px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { padding: 10px 15px; font-size: 16px; margin: 10px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        
        .status-bar { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .hand-label { font-size: 14px; color: #666; margin: 5px 0; font-weight: bold; }
        .card-area { display: flex; justify-content: center; gap: 8px; min-height: 90px; padding: 10px; background: #f8f9fa; border-radius: 8px; margin: 10px 0; }
        
        /* 棋牌設計 */
        .mj-card { width: 48px; height: 72px; background: #fffde8; border: 2px solid #5d4037; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.2); user-select: none; }
        .mj-card.red { color: #d32f2f; }
        .mj-card.black { color: #212121; }
        .mj-card:hover { transform: translateY(-5px); background: #fff; }
        
        /* 牌河 */
        .pool-area { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; min-height: 120px; background: #e0f2f1; padding: 15px; border-radius: 8px; border: 2px dashed #009688; margin: 15px 0; }
        .pool-area .mj-card { width: 35px; height: 52px; font-size: 20px; cursor: default; }
        .pool-area .mj-card:hover { transform: none; background: #fffde8; }
        
        /* 玩家名單 */
        .player-list { background: #f1f3f4; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: flex; justify-content: space-around; }
        .player-list span.active { color: #28a745; font-weight: bold; text-decoration: underline; }

        .btn-win { background: #28a745; font-size: 18px; padding: 12px 25px; }
        .btn-win:hover { background: #218838; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="lobby">
        <h2>🀄️ 線上四人象棋麻將 湊桌大廳</h2>
        <input type="text" id="username" placeholder="輸入你的名字" value="玩家"><br>
        <input type="text" id="roomCode" placeholder="輸入房號 (如: 777)"><br>
        <button onclick="connectToGame()">進入房間 / 開始湊桌</button>
        <div id="wait-msg" style="margin-top: 15px; color: #666;"></div>
    </div>

    <div id="game-container" class="hidden">
        <div id="status" class="status-bar">等待其他對手加入...</div>
        
        <div class="player-list" id="players-order"></div>
        
        <div class="hand-label">公共牌河 ｜ 剩餘牌數: <span id="deck-count">--</span> 張</div>
        <div id="card-pool" class="pool-area"></div>
        
        <div class="hand-label">您的手牌 (目前手牌: <span id="card-count">0</span> 張，點擊即可打出)</div>
        <div id="my-hand" class="card-area"></div>
        
        <div class="action-panel">
            <button id="win-btn" class="btn-win hidden" onclick="declareWin()">我胡牌了！🎉 (滿8張)</button>
        </div>
    </div>

    <script>
        // ⚠️ 請記得把這裡換成你剛才在 Render 得到的 https 網址！
        const SERVER_URL = "https://mahjong-server-nwmj.onrender.com"; 
        
        let socket;
        let currentRoom = "";
        let myTurn = false;
        const redCards = ['帥', '仕', '相', '車', '馬', '炮', '兵'];
        let allPlayerNames = [];

        function connectToGame() {
            const username = document.getElementById('username').value.trim();
            const roomCode = document.getElementById('roomCode').value.trim();
            
            if(!username || !roomCode) {
                alert('請填入名字與房號！');
                return;
            }

            currentRoom = roomCode;
            socket = io(SERVER_URL);

            socket.emit('joinRoom', { username, roomCode });
            document.getElementById('wait-msg').innerText = `已排入房號 ${roomCode}，等待湊滿 4 人...`;

            socket.on('roomUpdated', (players) => {
                document.getElementById('wait-msg').innerText = `目前房內玩家 (${players.length}/4 人): ${players.join(', ')}`;
            });

            socket.on('gameStart', (data) => {
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                allPlayerNames = data.playerNames;
                updateUI(data);
            });

            socket.on('gameStateUpdated', (data) => {
                updateUI(data);
            });

            socket.on('gameOver', ({ winner, reason }) => {
                alert(`遊戲結束！\n贏家：${winner}\n原因：${reason}`);
                location.reload();
            });

            socket.on('errorMessage', (msg) => {
                alert(msg);
                location.reload();
            });
        }

        function updateUI(data) {
            myTurn = data.isMyTurn;
            document.getElementById('deck-count').innerText = data.deckCount;
            document.getElementById('card-count').innerText = data.myHand.length;
            
            // 顯示目前是誰的回合
            if (myTurn) {
                document.getElementById('status').innerText = "🟢 輪到你的回合！請摸牌後選擇一張打出。";
            } else {
                document.getElementById('status').innerText = "🔴 等待對手出牌中...";
            }

            // 渲染四人名單與目前出牌標示
            const orderDiv = document.getElementById('players-order');
            orderDiv.innerHTML = "";
            allPlayerNames.forEach((name) => {
                orderDiv.innerHTML += `<span>👤 ${name}</span>`;
            });

            // 核心規則：手牌滿 8 張（代表摸牌後），且是自己的回合，才顯示胡牌按鈕
            if (myTurn && data.myHand.length === 8) {
                document.getElementById('win-btn').classList.remove('hidden');
            } else {
                document.getElementById('win-btn').classList.add('hidden');
            }

            // 渲染我的手牌
            const myHandDiv = document.getElementById('my-hand');
            myHandDiv.innerHTML = "";
            data.myHand.forEach((card, index) => {
                const colorClass = redCards.includes(card) ? 'red' : 'black';
                myHandDiv.innerHTML += `<div class="mj-card ${colorClass}" onclick="playCard(${index})">${card}</div>`;
            });

            // 渲染牌河
            const poolDiv = document.getElementById('card-pool');
            poolDiv.innerHTML = "";
            data.pool.forEach(card => {
                const colorClass = redCards.includes(card) ? 'red' : 'black';
                poolDiv.innerHTML += `<div class="mj-card ${colorClass}">${card}</div>`;
            });
        }

        function playCard(index) {
            if (!myTurn) {
                alert("還沒輪到你喔！");
                return;
            }
            socket.emit('playCard', { roomCode: currentRoom, cardIndex: index });
        }

        function declareWin() {
            if (!myTurn) return;
            if (confirm("確定您手牌已滿足 8 張胡牌條件了嗎？")) {
                socket.emit('claimWin', { roomCode: currentRoom });
            }
        }
    </script>
</body>
</html>
